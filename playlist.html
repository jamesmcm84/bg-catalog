<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=0.5, maximum-scale=5.0">
<title>BoardVault — Playlists</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #F5A623; --dark: #252527; --panel: #2E2E30; --border: #3A3A3E; --text: #F0EAE0; --muted: #888; }
html, body { background: #3A3A3C; color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }
header { background: var(--dark); border-bottom: 2px solid var(--gold); padding: 0.85rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--gold); }
.logo em { color: var(--text); font-style: normal; }
.back { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; text-decoration: none; transition: color 0.15s; }
.back:hover { color: var(--gold); }
main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
.columns { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
.col-header { display: flex; align-items: center; gap: 10px; padding: 0.8rem 1.2rem; border-radius: 8px 8px 0 0; border-bottom: 3px solid transparent; }
.col-header.james { background: #1A1A1A; border-bottom-color: var(--gold); }
.col-header.alysa { background: #4A1A7A; border-bottom-color: #C89EE0; }
.col-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: #F4EFE5; flex: 1; }
.col-count { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #888; }
.game-list { display: flex; flex-direction: column; gap: 8px; }
.playlist-item { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; align-items: stretch; transition: border-color 0.15s; }
.playlist-item:hover { border-color: #555; }
.playlist-item.played { opacity: 0.5; }
.item-cover { width: 70px; flex-shrink: 0; overflow: hidden; background: #222; }
.item-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.item-cover-ph { width: 100%; min-height: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
.item-body { flex: 1; padding: 0.7rem 0.9rem; display: flex; flex-direction: column; justify-content: space-between; gap: 6px; }
.item-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 1px; color: var(--text); line-height: 1; text-decoration: none; }
.item-title:hover { color: var(--gold); }
.item-date { font-family: 'Barlow Condensed', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #666; }
.item-played-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }
.item-actions { display: flex; gap: 6px; }
.btn-played { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 3px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; transition: all 0.15s; }
.btn-played:hover, .btn-played.active { background: var(--gold); border-color: var(--gold); color: #111; }
.btn-remove { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 3px; border: 1px solid #3a3a3e; background: transparent; color: #555; cursor: pointer; transition: all 0.15s; }
.btn-remove:hover { border-color: #CC1A1A; color: #CC1A1A; }
.empty-list { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; color: #444; text-align: center; padding: 2.5rem 1rem; background: var(--panel); border: 1px dashed var(--border); border-radius: 8px; }
.spinner { width: 36px; height: 36px; border: 3px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #252527; color: #F0EAE0; font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem; letter-spacing: 1px; padding: 10px 16px; border-radius: 8px; border-left: 3px solid #4CAF77; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateY(0); }
@media (max-width: 640px) { .columns { grid-template-columns: 1fr; } header { padding: 0.85rem 1rem; } }
</style>
</head>
<body>
<header>
  <div class="logo">Board<em>Vault</em></div>
  <a href="index.html" class="back">← Collection</a>
</header>
<main>
  <div id="content" style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:5rem 0;color:#666">
    <div class="spinner"></div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase">Loading playlists…</div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
const API = 'https://script.google.com/macros/s/AKfycbxWVpfpgVg2sbBH5PszE2hoNWL7ZBXh_TdIIBQFj-sJSL2cakGfgqBBHYIDElVwI5wr/exec';
let allItems = [];

async function load() {
  try {
    const res = await fetch(API + '?action=getPlaylist');
    allItems = await res.json();
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:4rem;color:#666">Could not load playlists.</div>';
  }
}

function render() {
  const james = allItems.filter(i => i.Person === 'James');
  const alysa = allItems.filter(i => i.Person === 'Alysa');
  document.getElementById('content').innerHTML = `
    <div class="columns">
      <div>
        <div class="col-header james">
          <div class="col-title">James</div>
          <div class="col-count">${james.filter(i=>i.Status!=='Played').length} queued · ${james.filter(i=>i.Status==='Played').length} played</div>
        </div>
        <div class="game-list" style="margin-top:8px">${renderList(james)}</div>
      </div>
      <div>
        <div class="col-header alysa">
          <div class="col-title">Alysa</div>
          <div class="col-count">${alysa.filter(i=>i.Status!=='Played').length} queued · ${alysa.filter(i=>i.Status==='Played').length} played</div>
        </div>
        <div class="game-list" style="margin-top:8px">${renderList(alysa)}</div>
      </div>
    </div>`;
}

function renderList(items) {
  if (!items.length) return '<div class="empty-list">No games queued yet</div>';
  const sorted = [...items].sort((a,b) => {
    if (a.Status==='Played' && b.Status!=='Played') return 1;
    if (a.Status!=='Played' && b.Status==='Played') return -1;
    return 0;
  });
  return sorted.map(item => {
    const isPlayed = item.Status === 'Played';
    const dateStr = item.AddedDate ? new Date(item.AddedDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    return `<div class="playlist-item ${isPlayed?'played':''}" id="item-${item._row}">
      <div class="item-cover">
        ${item.CoverURL?`<img src="${item.CoverURL}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'item-cover-ph\'>🎲</div>'">`:'<div class="item-cover-ph">🎲</div>'}
      </div>
      <div class="item-body">
        <div>
          <a href="game.html?slug=${encodeURIComponent(item.GameSlug||'')}" class="item-title">${item.GameTitle||item.GameSlug}</a>
          <div class="item-date">Added ${dateStr}</div>
          ${isPlayed?'<div class="item-played-badge">✓ Played</div>':''}
        </div>
        <div class="item-actions">
          <button class="btn-played ${isPlayed?'active':''}" onclick="markPlayed(${item._row},'${isPlayed?'Queued':'Played'}',this)">${isPlayed?'Unmark':'✓ Played'}</button>
          <button class="btn-remove" onclick="removeItem(${item._row},this)">Remove</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function markPlayed(row, newStatus, btn) {
  btn.textContent='…'; btn.disabled=true;
  try {
    await fetch(API, { method:'POST', body: JSON.stringify({action:'updatePlaylistStatus',row,status:newStatus}) });
    const item = allItems.find(i=>i._row===row);
    if (item) item.Status = newStatus;
    render();
    showToast(newStatus==='Played'?'Marked as played ✓':'Moved back to queue');
  } catch(e) { showToast('Could not update'); btn.textContent=newStatus==='Played'?'✓ Played':'Unmark'; btn.disabled=false; }
}

async function removeItem(row, btn) {
  if (!confirm('Remove this game from the playlist?')) return;
  btn.textContent='…'; btn.disabled=true;
  try {
    await fetch(API, { method:'POST', body: JSON.stringify({action:'removeFromPlaylist',row}) });
    allItems = allItems.filter(i=>i._row!==row);
    render();
    showToast('Removed from playlist');
  } catch(e) { showToast('Could not remove'); btn.textContent='Remove'; btn.disabled=false; }
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

load();
</script>
</body>
</html>
