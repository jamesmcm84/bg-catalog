<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=0.5, maximum-scale=5.0">
<title>BoardVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #F5A623; --gold-dk: #C47D0A; --red: #CC1A1A; }
html, body { background: #3A3A3C; font-family: 'Barlow', sans-serif; min-height: 100vh; color: #F0EAE0; }

header {
  background: #252527; border-bottom: 2px solid var(--gold);
  padding: 0.85rem 2rem; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--gold); }
.logo em { color: #F0EAE0; font-style: normal; }
.back { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; text-decoration: none; transition: color 0.15s; }
.back:hover { color: var(--gold); }

.page { max-width: 740px; margin: 0 auto; padding: 2rem 1rem 5rem; }

/* ═══════ SHEET ═══════ */
.sheet {
  background: #F4EFE5; border-radius: 5px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.3);
  color: #1A1A1A;
}

.sh-topbar { background: #111; display: flex; align-items: stretch; min-height: 200px; }
.sh-cover { width: 190px; flex-shrink: 0; overflow: hidden; background: #222; }
.sh-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sh-cover-ph { width: 100%; min-height: 200px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
.sh-title-block { flex: 1; padding: 0.9rem 1.1rem; display: flex; flex-direction: column; justify-content: space-between; }
.sh-badges-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: space-between; }
.sh-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; white-space: nowrap; }
.sh-badge-gold { background: #F5A623; color: #111; }
.sh-badge-teal { background: #1A7A7A; color: #fff; }
.sh-badge-purple { background: #6A2FA0; color: #fff; }
.sh-badge-red { background: var(--red); color: #fff; }
.sh-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; letter-spacing: 1px; line-height: 1; color: #F4EFE5; display: block; padding: 6px 0 0; }
.sh-meta-row { display: flex; align-items: center; justify-content: space-between; }
.sh-meta { display: flex; gap: 14px; flex-wrap: wrap; }
.sh-meta-item { font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 600; color: #bbb; }
.sh-year { font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: 3px; color: #fff; }

.sh-mid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #D0CAB8; }
.sh-desc { padding: 1.1rem 1.3rem; border-right: 1px solid #D0CAB8; }
.sh-desc p { font-size: 0.86rem; line-height: 1.65; color: #333; }
.sh-mech-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
.sh-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 0.63rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; background: #E0D8CC; color: #555; border: 1px solid #CBC3B5; }
.sh-photo { overflow: hidden; background: #DDD8CC; min-height: 130px; display: flex; align-items: center; justify-content: center; }
.sh-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sh-photo-ph { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; }

.sh-bottom { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #D0CAB8; }
.sh-info { padding: 1rem 1.3rem; border-right: 1px solid #D0CAB8; }
.sh-info-row { display: flex; font-size: 0.8rem; line-height: 1.4; border-bottom: 1px dotted #D0CAB8; padding: 4px 0; gap: 5px; }
.sh-info-row:last-child { border-bottom: none; }
.sh-info-key { font-weight: 700; color: #333; min-width: 105px; flex-shrink: 0; }
.sh-info-val { color: #555; }
.cpip { display: inline-block; width: 10px; height: 10px; border-radius: 2px; background: #CCC; margin-right: 2px; }
.cpip.on { background: var(--red); }

.sh-ratings { padding: 1rem 1.3rem; display: flex; flex-direction: column; gap: 12px; }
.sh-rating-person { display: flex; align-items: center; justify-content: space-between; }
.sh-rating-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: #555; min-width: 65px; }
.sh-rating-stars { display: flex; gap: 3px; }
.sstar { font-size: 20px; color: #F5A623; cursor: pointer; transition: transform 0.1s; }
.sstar:hover { transform: scale(1.2); }
.sstar.empty { color: #CCC; }
.sh-rating-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; color: #222; min-width: 40px; text-align: right; }
.sh-rating-divider { border: none; border-top: 1px solid #D0CAB8; }
.sh-overall { display: flex; align-items: center; justify-content: space-between; background: #1A1A1A; margin: -1rem -1.3rem -1rem; padding: 0.7rem 1.3rem; margin-top: 4px; }
.sh-overall-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #888; }
.sh-overall-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; line-height: 1; color: #F5A623; }
.sh-overall-stars { display: flex; gap: 2px; margin-top: 2px; }

.sh-links { background: #ECEAE0; padding: 0.7rem 1.3rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #D0CAB8; }
.sh-link { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; padding: 4px 12px; border-radius: 4px; border: 1.5px solid #bbb; color: #333; display: inline-flex; align-items: center; gap: 5px; background: #fff; transition: border-color 0.15s; }
.sh-link:hover { border-color: #555; }
.sh-link.bgg { background: #E8622A; border-color: #E8622A; color: #fff; }

.sh-playlist-bar { background: #ECEAE0; padding: 0.7rem 1.3rem; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #D0CAB8; }
.playlist-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
.playlist-btn.james { background: #1A1A1A; color: #F4EFE5; }
.playlist-btn.james:hover { background: #333; }
.playlist-btn.alysa { background: #6A2FA0; color: #fff; }
.playlist-btn.alysa:hover { background: #8B3FCC; }

.sh-footer { background: #1A1A1A; padding: 0.6rem 1.3rem; }
.sh-designer { font-family: 'Barlow Condensed', sans-serif; font-size: 0.68rem; letter-spacing: 1px; color: #666; }

/* expansions */
.sh-exp-header { background: #1A1A1A; padding: 0.6rem 1.3rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: #F4EFE5; border-top: 2px solid #D0CAB8; }
.sh-exp-item { display: grid; grid-template-columns: 90px 1fr; border-bottom: 1px solid #D0CAB8; }
.sh-exp-item:last-child { border-bottom: none; }
.sh-exp-cover { overflow: hidden; background: #DDD8CC; display: flex; align-items: center; justify-content: center; border-right: 1px solid #D0CAB8; min-height: 90px; }
.sh-exp-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sh-exp-cover-ph { font-size: 1.8rem; color: #bbb; }
.sh-exp-body { padding: 0.8rem 1rem; display: flex; flex-direction: column; gap: 5px; background: #F4EFE5; }
.sh-exp-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px; color: #1A1A1A; line-height: 1; }
.sh-exp-desc { font-size: 0.78rem; line-height: 1.5; color: #555; }
.sh-exp-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
.sh-exp-link { font-family: 'Barlow Condensed', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; padding: 2px 8px; border-radius: 3px; border: 1px solid #C8C0B0; color: #555; background: #fff; }
.sh-exp-link.bgg { background: #E8622A; border-color: #E8622A; color: #fff; }

/* card sections */
.card-section { background: #ECEAE0; border-top: 2px solid #D0CAB8; }
.card-section-header { display: flex; align-items: center; gap: 8px; padding: 0.7rem 1.3rem; background: #1A1A1A; }
.card-section-icon { font-size: 14px; }
.card-section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: #F4EFE5; flex: 1; }
.toggle-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 12px; padding: 2px 6px; }
.toggle-btn:hover { color: var(--gold); }

/* play log */
.play-form { padding: 0.9rem 1.3rem; background: #F4EFE5; border-bottom: 1px solid #D0CAB8; display: flex; flex-direction: column; gap: 10px; }
.play-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.pf { display: flex; flex-direction: column; gap: 3px; }
.pf label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; }
.pf input, .pf select { background: #fff; border: 1px solid #C8C0B0; color: #222; font-family: 'Barlow', sans-serif; font-size: 0.83rem; padding: 5px 8px; border-radius: 4px; outline: none; }
.pf input[type=date] { width: 130px; }
.pf input[type=text] { width: 80px; }
.pf select { min-width: 130px; }
.pchk { display: flex; gap: 10px; margin-top: 4px; }
.pchk label { display: flex; align-items: center; gap: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; color: #555; cursor: pointer; }
.card-log-btn { background: #1A1A1A; color: #F4EFE5; font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; padding: 7px 16px; border-radius: 4px; cursor: pointer; transition: background 0.15s; }
.card-log-btn:hover { background: #333; }

.play-history { padding: 0.8rem 1.3rem; background: #F4EFE5; display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
.play-entry { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #D8D0C4; border-radius: 5px; padding: 0.6rem 0.9rem; gap: 10px; }
.pe-left { display: flex; flex-direction: column; gap: 2px; }
.pe-date { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #999; }
.pe-players { font-family: 'Barlow', sans-serif; font-size: 0.82rem; color: #333; }
.pe-winner { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #8B6914; }
.pe-scores { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; color: #888; }
.no-plays { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; text-align: center; padding: 1rem 0; }
.plays-loading { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; text-align: center; padding: 1rem 0; }

/* chat */
.chat-win { background: #F4EFE5; padding: 0.9rem 1.3rem; display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; border-bottom: 1px solid #D0CAB8; }
.msg { display: flex; gap: 8px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 0.6rem; font-weight: 700; flex-shrink: 0; }
.msg.user .av { background: #1A1A1A; color: #F4EFE5; }
.msg.ai .av { background: #E0D8CC; color: #555; border: 1px solid #C8C0B0; }
.bubble { max-width: 82%; padding: 7px 11px; border-radius: 8px; font-size: 0.83rem; line-height: 1.55; }
.msg.user .bubble { background: #1A1A1A; color: #F4EFE5; border-radius: 8px 2px 8px 8px; }
.msg.ai .bubble { background: #fff; color: #333; border-radius: 2px 8px 8px 8px; border: 1px solid #D8D0C4; }
.msg.ai .bubble.loading { color: #aaa; font-style: italic; }
.chat-input-row { display: flex; background: #F4EFE5; padding: 0.7rem 1.3rem; border-bottom: 1px solid #D0CAB8; }
.chat-input-row input { flex: 1; background: #fff; border: 1px solid #C8C0B0; border-right: none; color: #222; font-family: 'Barlow', sans-serif; font-size: 0.85rem; padding: 8px 11px; border-radius: 4px 0 0 4px; outline: none; }
.chat-send { background: #1A1A1A; color: #F4EFE5; font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; border: none; padding: 8px 16px; border-radius: 0 4px 4px 0; cursor: pointer; }

.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #252527; color: #F0EAE0; font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem; letter-spacing: 1px; padding: 10px 16px; border-radius: 8px; border-left: 3px solid #4CAF77; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 600px) {
  .sh-mid { grid-template-columns: 1fr; }
  .sh-bottom { grid-template-columns: 1fr; }
  .sh-info { border-right: none; border-bottom: 1px solid #D0CAB8; }
  .sh-title { font-size: 2.2rem !important; }
  header { padding: 0.85rem 1rem; }
}
</style>
</head>
<body>
<header>
  <div class="logo">Board<em>Vault</em></div>
  <a href="index.html" class="back">← Collection</a>
</header>

<div class="page" id="page">
  <div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:5rem 0;color:#666">
    <div style="width:36px;height:36px;border:3px solid #333;border-top-color:#F5A623;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase">Loading…</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxWVpfpgVg2sbBH5PszE2hoNWL7ZBXh_TdIIBQFj-sJSL2cakGfgqBBHYIDElVwI5wr/exec';
const ANTHROPIC_KEY = 'YOUR-API-KEY-HERE';
const params = new URLSearchParams(window.location.search);
const SLUG = params.get('slug') || '';
let GAME = null;
let currentRatings = { james: 0, alysa: 0 };

async function init() {
  // Load game data from local JSON — fast!
  try {
    const res = await fetch('/games.json?v=' + Date.now());
    const games = await res.json();
    GAME = games.find(g => g.slug === SLUG);
    if (!GAME) {
      document.getElementById('page').innerHTML = '<div style="text-align:center;padding:4rem;color:#666"><h2 style="font-family:\'Bebas Neue\',sans-serif;font-size:2rem;letter-spacing:3px">Game Not Found</h2><p style="margin-top:8px"><a href="index.html" style="color:#F5A623">← Back to Collection</a></p></div>';
      return;
    }
    document.title = GAME.title + ' — BoardVault';
    renderPage(GAME);
    // Load plays async after page renders — doesn't block display
    loadPlays();
  } catch(e) {
    document.getElementById('page').innerHTML = '<div style="text-align:center;padding:4rem;color:#666">Could not load game data.</div>';
  }
}

function stars(r, sz, interactive, person) {
  return [1,2,3,4,5].map(n => {
    const filled = n <= Math.round(r);
    if (interactive) {
      return `<span class="sstar ${filled?'':'empty'}" style="font-size:${sz}px" data-person="${person}" data-val="${n}" onclick="setRating('${person}',${n})" onmouseover="hoverRating('${person}',${n})" onmouseout="resetHover('${person}')">★</span>`;
    }
    return `<span class="sstar ${filled?'':'empty'}" style="font-size:${sz}px">★</span>`;
  }).join('');
}

function renderPage(g) {
  const jR = parseFloat(g.jRating)||0, aR = parseFloat(g.aRating)||0;
  currentRatings = { james: jR, alysa: aR };
  const both = [jR,aR].filter(r=>r>0);
  const overall = both.length ? both.reduce((a,b)=>a+b,0)/both.length : 0;
  const complexity = parseInt(g.complexity)||1;
  const accent = g.accentColor || '#CC1A1A';
  const mechs = Array.isArray(g.mechanisms) ? g.mechanisms : (g.mechanisms||'').split(',').map(s=>s.trim()).filter(Boolean);

  const pipsHtml = [1,2,3,4,5].map(n=>`<span class="cpip ${n<=complexity?'on':''}" style="${n<=complexity?'background:'+accent:''}"></span>`).join('');

  const infoRows = [
    g.theme ? `<div class="sh-info-row"><span class="sh-info-key">Theme</span><span class="sh-info-val">${g.theme}</span></div>` : '',
    `<div class="sh-info-row"><span class="sh-info-key">Complexity</span><span class="sh-info-val">${pipsHtml} <span style="font-size:0.78rem;color:#777">${complexity}/5</span></span></div>`,
    g.designer ? `<div class="sh-info-row"><span class="sh-info-key">Designer</span><span class="sh-info-val">${g.designer}</span></div>` : '',
    g.publisher ? `<div class="sh-info-row"><span class="sh-info-key">Publisher</span><span class="sh-info-val">${g.publisher}</span></div>` : '',
  ].filter(Boolean).join('');

  const linksHtml = [
    g.videoURL ? `<a class="sh-link" href="${g.videoURL}" target="_blank">▶ How to Play</a>` : '',
    g.rulebookURL ? `<a class="sh-link" href="${g.rulebookURL}" target="_blank">📄 Rulebook</a>` : '',
    g.bggURL ? `<a class="sh-link bgg" href="${g.bggURL}" target="_blank">🎯 BGG</a>` : '',
  ].filter(Boolean).join('');

  const expansionsHtml = (g.expansions||[]).length ? `
    <div class="sh-exp-header">📦 Expansions</div>
    ${g.expansions.map(ex=>`
      <div class="sh-exp-item">
        <div class="sh-exp-cover">
          ${ex.coverURL?`<img src="${ex.coverURL}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'sh-exp-cover-ph\'>📦</div>'">`:'<div class="sh-exp-cover-ph">📦</div>'}
        </div>
        <div class="sh-exp-body">
          <div class="sh-exp-name">${ex.name||''}</div>
          ${ex.description?`<div class="sh-exp-desc">${ex.description}</div>`:''}
          <div class="sh-exp-links">
            ${ex.videoURL?`<a class="sh-exp-link" href="${ex.videoURL}" target="_blank">▶ How to Play</a>`:''}
            ${ex.rulebookURL?`<a class="sh-exp-link" href="${ex.rulebookURL}" target="_blank">📄 Rulebook</a>`:''}
            ${ex.bggURL?`<a class="sh-exp-link bgg" href="${ex.bggURL}" target="_blank">🎯 BGG</a>`:''}
          </div>
        </div>
      </div>`).join('')}` : '';

  document.getElementById('page').innerHTML = `
  <div class="sheet">
    <div class="sh-topbar">
      <div class="sh-cover">
        ${g.coverURL?`<img src="${g.coverURL}" alt="${g.title}" onerror="this.parentElement.innerHTML='<div class=\'sh-cover-ph\'>🎲</div>'">`:'<div class="sh-cover-ph">🎲</div>'}
      </div>
      <div class="sh-title-block">
        <div class="sh-badges-row">
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${g.gameType?`<span class="sh-badge sh-badge-purple">${g.gameType}</span>`:''}
            ${g.style?`<span class="sh-badge sh-badge-teal">${g.style}</span>`:''}
            ${g.category?`<span class="sh-badge sh-badge-gold">${g.category}</span>`:''}
          </div>
          ${g.location?`<span class="sh-badge sh-badge-red">${g.location}</span>`:''}
        </div>
        <div class="sh-title" style="font-size:${(g.title||'').length>22?'2rem':(g.title||'').length>14?'2.6rem':'3.2rem'}">${g.title||''}</div>
        <div class="sh-meta-row">
          <div class="sh-meta">
            ${g.players?`<span class="sh-meta-item">👥 ${g.players}</span>`:''}
            ${g.time?`<span class="sh-meta-item">⏱ ${g.time}</span>`:''}
            ${g.age?`<span class="sh-meta-item">🎂 Age ${g.age}+</span>`:''}
          </div>
          ${g.year?`<div class="sh-year">${g.year}</div>`:''}
        </div>
      </div>
    </div>

    <div class="sh-mid">
      <div class="sh-desc">
        ${g.description?`<p>${g.description}</p>`:''}
        ${mechs.length?`<div class="sh-mech-tags">${mechs.map(m=>`<span class="sh-tag">${m}</span>`).join('')}</div>`:''}
      </div>
      <div class="sh-photo">
        ${g.gameplayURL?`<img src="${g.gameplayURL}" alt="Gameplay" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'sh-photo-ph\'>Gameplay Photo</div>'">`:'<div class="sh-photo-ph">Gameplay Photo</div>'}
      </div>
    </div>

    <div class="sh-bottom">
      <div class="sh-info">${infoRows||'<div class="sh-info-row" style="color:#bbb;font-family:\'Barlow Condensed\',sans-serif;font-size:0.72rem;letter-spacing:1px;text-transform:uppercase">Details appear here</div>'}</div>
      <div class="sh-ratings">
        <div class="sh-rating-person">
          <span class="sh-rating-name">James</span>
          <div class="sh-rating-stars" id="james-stars">${stars(jR,20,true,'james')}</div>
          <span class="sh-rating-num" id="james-num" style="color:${jR>0?'#222':'#ccc'}">${jR>0?jR.toFixed(1):'—'}</span>
        </div>
        <div class="sh-rating-person">
          <span class="sh-rating-name">Alysa</span>
          <div class="sh-rating-stars" id="alysa-stars">${stars(aR,20,true,'alysa')}</div>
          <span class="sh-rating-num" id="alysa-num" style="color:${aR>0?'#222':'#ccc'}">${aR>0?aR.toFixed(1):'—'}</span>
        </div>
        <hr class="sh-rating-divider">
        <div class="sh-overall">
          <div>
            <div class="sh-overall-label">Overall</div>
            <div class="sh-overall-stars" id="overall-stars">${overall>0?stars(overall,16,false,''):''}</div>
          </div>
          <div class="sh-overall-num" id="overall-num">${overall>0?overall.toFixed(1):'—'}</div>
        </div>
      </div>
    </div>

    ${linksHtml?`<div class="sh-links">${linksHtml}</div>`:''}

    <div class="sh-playlist-bar">
      <button class="playlist-btn james" onclick="addToPlaylist('james')">📋 Add to James' List</button>
      <button class="playlist-btn alysa" onclick="addToPlaylist('alysa')">📋 Add to Alysa's List</button>
    </div>

    <div class="sh-footer">
      ${g.designer?`<div class="sh-designer">Designer: ${g.designer}</div>`:''}
      ${g.publisher?`<div class="sh-designer" style="color:#555">Publisher: ${g.publisher}</div>`:''}
    </div>

    ${expansionsHtml?`<div>${expansionsHtml}</div>`:''}

    <!-- PLAY LOG -->
    <div class="card-section">
      <div class="card-section-header">
        <span class="card-section-icon">🎲</span>
        <span class="card-section-title">Play Log</span>
        <button class="toggle-btn" onclick="toggleSec('plays-body',this)">▼</button>
      </div>
      <div id="plays-body">
        <div class="play-form">
          <div class="play-row">
            <div class="pf"><label>Date</label><input type="date" id="p-date"></div>
            <div class="pf"><label>Players</label>
              <div class="pchk">
                <label><input type="checkbox" id="p-james" checked> James</label>
                <label><input type="checkbox" id="p-alysa"> Alysa</label>
              </div>
            </div>
            <div class="pf" id="jswrap"><label>James Score</label><input type="text" id="p-jscore" placeholder="42"></div>
            <div class="pf" id="aswrap" style="display:none"><label>Alysa Score</label><input type="text" id="p-ascore" placeholder="38"></div>
            <div class="pf"><label>Winner</label>
              <select id="p-winner">
                <option value="">—</option>
                <option>James</option><option>Alysa</option>
                <option>Both / Co-op Win</option><option>No Winner</option>
              </select>
            </div>
          </div>
          <div class="pf" style="width:100%"><label>Notes</label><input type="text" id="p-notes" placeholder="Optional…" style="width:100%"></div>
          <button class="card-log-btn" id="log-btn" onclick="logPlay()">+ Log Play</button>
        </div>
        <div class="play-history" id="play-log"><div class="plays-loading">Loading plays…</div></div>
      </div>
    </div>

    <!-- ASK CLAUDE -->
    <div class="card-section" style="border-radius:0 0 5px 5px">
      <div class="card-section-header">
        <span class="card-section-icon">💬</span>
        <span class="card-section-title">Ask Claude — Rules Q&amp;A</span>
        <button class="toggle-btn" onclick="toggleSec('ask-body',this)">▼</button>
      </div>
      <div id="ask-body">
        <div class="chat-win" id="chat-win">
          <div class="msg ai"><div class="av">BV</div><div class="bubble">Hi! Ask me anything about <strong>${g.title}</strong> — rules, setup, edge cases, strategy tips.</div></div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chat-inp" placeholder="Ask a rules question…" onkeydown="if(event.key==='Enter')sendChat()">
          <button class="chat-send" onclick="sendChat()">Ask</button>
        </div>
        <div style="background:#ECEAE0;padding:0.4rem 1.3rem;font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;letter-spacing:1px;color:#aaa">AI-generated — verify with the rulebook for competitive play.</div>
      </div>
    </div>
  </div>`;

  document.getElementById('p-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('p-alysa').addEventListener('change', function() {
    document.getElementById('aswrap').style.display = this.checked ? '' : 'none';
  });
}

// ── RATINGS (saves to games.json via Netlify — needs Netlify Forms or just Google Sheets) ──
function hoverRating(person, val) {
  document.querySelectorAll(`[data-person="${person}"]`).forEach(s => {
    s.className = 'sstar ' + (parseInt(s.dataset.val) <= val ? '' : 'empty');
  });
}
function resetHover(person) {
  const cur = currentRatings[person];
  document.querySelectorAll(`[data-person="${person}"]`).forEach(s => {
    s.className = 'sstar ' + (parseInt(s.dataset.val) <= Math.round(cur) ? '' : 'empty');
  });
}
async function setRating(person, val) {
  if (currentRatings[person] === val) val = 0;
  currentRatings[person] = val;
  resetHover(person);
  const numEl = document.getElementById(person + '-num');
  numEl.textContent = val > 0 ? val.toFixed(1) : '—';
  numEl.style.color = val > 0 ? '#222' : '#ccc';
  updateOverall();
  // Save to Google Sheets
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateRating', slug: SLUG, person, rating: val })
    });
    showToast((person==='james'?'James':'Alysa') + ' rating saved ✓');
  } catch(e) { showToast('Could not save rating'); }
}
function updateOverall() {
  const both = [currentRatings.james, currentRatings.alysa].filter(r => r > 0);
  const overall = both.length ? both.reduce((a,b)=>a+b,0)/both.length : 0;
  document.getElementById('overall-num').textContent = overall > 0 ? overall.toFixed(1) : '—';
  document.getElementById('overall-stars').innerHTML = overall > 0 ? stars(overall, 16, false, '') : '';
}

// ── PLAYS ──
async function loadPlays() {
  try {
    const res = await fetch(API + '?action=getPlays&slug=' + encodeURIComponent(SLUG));
    const plays = await res.json();
    renderPlays(plays||[]);
  } catch(e) {
    const log = document.getElementById('play-log');
    if (log) log.innerHTML = '<div class="no-plays">Could not load plays</div>';
  }
}

function renderPlays(plays) {
  const log = document.getElementById('play-log');
  if (!log) return;
  if (!plays.length) { log.innerHTML = '<div class="no-plays">No plays logged yet</div>'; return; }
  log.innerHTML = plays.map(p => {
    const dateStr = p.Date ? new Date(p.Date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    const scores = [p.JScore?'James: '+p.JScore:'', p.AScore?'Alysa: '+p.AScore:''].filter(Boolean);
    return `<div class="play-entry">
      <div class="pe-left">
        <div class="pe-date">${dateStr}</div>
        <div class="pe-players">${p.Players||''}</div>
        ${p.Winner?`<div class="pe-winner">🏆 ${p.Winner}</div>`:''}
        ${scores.length?`<div class="pe-scores">${scores.join(' · ')}</div>`:''}
        ${p.Notes?`<div class="pe-scores" style="font-style:italic">${p.Notes}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function logPlay() {
  const date = document.getElementById('p-date').value;
  const james = document.getElementById('p-james').checked;
  const alysa = document.getElementById('p-alysa').checked;
  if (!date) { showToast('Please pick a date'); return; }
  if (!james && !alysa) { showToast('Select at least one player'); return; }
  const btn = document.getElementById('log-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({
        action: 'logPlay', gameSlug: SLUG, date,
        players: [james?'James':null, alysa?'Alysa':null].filter(Boolean).join(' & '),
        jScore: james ? document.getElementById('p-jscore').value.trim() : '',
        aScore: alysa ? document.getElementById('p-ascore').value.trim() : '',
        winner: document.getElementById('p-winner').value,
        notes: document.getElementById('p-notes').value.trim(),
      })
    });
    showToast('Play logged! ✓');
    document.getElementById('p-jscore').value = '';
    document.getElementById('p-ascore').value = '';
    document.getElementById('p-winner').value = '';
    document.getElementById('p-notes').value = '';
    loadPlays();
  } catch(e) { showToast('Error saving play'); }
  btn.textContent = '+ Log Play'; btn.disabled = false;
}

// ── PLAYLIST ──
async function addToPlaylist(person) {
  const btn = document.querySelector(`.playlist-btn.${person}`);
  const orig = btn.innerHTML;
  btn.innerHTML = 'Saving…'; btn.disabled = true;
  try {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addToPlaylist',
        person: person === 'james' ? 'James' : 'Alysa',
        gameSlug: SLUG,
        gameTitle: GAME?.title || SLUG,
        coverURL: GAME?.coverURL || ''
      })
    });
    const result = await res.json();
    showToast(result.success === false ? `Already on ${person==='james'?'James':'Alysa'}'s list!` : `Added to ${person==='james'?'James':'Alysa'}'s playlist ✓`);
  } catch(e) { showToast('Could not add to playlist'); }
  btn.innerHTML = orig; btn.disabled = false;
}

// ── TOGGLE ──
function toggleSec(id, btn) {
  const el = document.getElementById(id); if (!el) return;
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '▼' : '▶';
}

// ── ASK CLAUDE ──
async function sendChat() {
  const inp = document.getElementById('chat-inp');
  const q = inp.value.trim(); if (!q) return;
  inp.value = '';
  appendMsg('user', q);
  const loadId = appendMsg('ai', 'Thinking…', true);
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-allow-browser': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        system: `You are a board game rules expert for "${GAME?.title||'this game'}". ${GAME?.description?'Game: '+GAME.description+' ':''} ${GAME?.mechanisms?.length?'Mechanisms: '+GAME.mechanisms.join(', ')+'. ':''} Answer rules questions clearly. If unsure, recommend checking the rulebook.`,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await resp.json();
    updateMsg(loadId, data.content?.map(c=>c.text||'').join('')||'Sorry, could not get a response.');
  } catch(e) { updateMsg(loadId, 'Could not connect. Please try again.'); }
}
function appendMsg(role, text, loading=false) {
  const win = document.getElementById('chat-win');
  const id = 'msg'+Date.now()+Math.random();
  const div = document.createElement('div');
  div.className='msg '+role; div.id=id;
  div.innerHTML='<div class="av">'+(role==='user'?'ME':'BV')+'</div><div class="bubble'+(loading?' loading':'')+'">'+text+'</div>';
  win.appendChild(div); win.scrollTop=win.scrollHeight; return id;
}
function updateMsg(id, text) {
  const el=document.getElementById(id);
  if(el){el.querySelector('.bubble').textContent=text;el.querySelector('.bubble').classList.remove('loading');}
  const win=document.getElementById('chat-win'); if(win) win.scrollTop=99999;
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
</body>
</html>
