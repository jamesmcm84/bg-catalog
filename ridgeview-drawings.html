<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDGEVIEW — Project Drawings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #111827;
    --navy2: #1f2937;
    --navy3: #374151;
    --amber: #f59e0b;
    --amber-light: #fef3c7;
    --amber-dark: #92400e;
    --blue: #3b82f6;
    --blue-light: #eff6ff;
    --green: #22c55e;
    --green-light: #f0fdf4;
    --red: #ef4444;
    --red-light: #fef2f2;
    --gray50: #f9fafb;
    --gray100: #f3f4f6;
    --gray200: #e5e7eb;
    --gray300: #d1d5db;
    --gray400: #9ca3af;
    --gray600: #4b5563;
    --gray700: #374151;
    --gray900: #111827;
    --text: #111827;
    --text2: #4b5563;
    --text3: #9ca3af;
    --border: #e5e7eb;
    --surface: #ffffff;
    --bg: #f3f4f6;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LAYOUT ── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--navy);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; gap: 10px;
  }
  .bolt-badge {
    width: 32px; height: 32px; background: var(--amber);
    border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .bolt-badge svg { width: 16px; height: 16px; fill: var(--navy); }
  .logo-name { color: #fff; font-size: 15px; font-weight: 600; line-height: 1.2; }
  .logo-tagline { color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
  .sidebar-nav { padding: 12px 10px; flex: 1; }
  .nav-label { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 8px 10px 4px; font-weight: 500; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 10px; border-radius: 7px;
    color: rgba(255,255,255,0.6); font-size: 13.5px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; margin-bottom: 2px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
  .nav-item.active { background: rgba(245,158,11,0.18); color: var(--amber); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-footer {
    padding: 14px 10px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .user-row {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 7px;
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--amber); color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { color: #fff; font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { color: rgba(255,255,255,0.35); font-size: 10.5px; }
  .logout-btn {
    background: none; border: none; color: rgba(255,255,255,0.3);
    cursor: pointer; padding: 2px; transition: color 0.15s; flex-shrink: 0;
  }
  .logout-btn:hover { color: rgba(255,255,255,0.7); }
  .logout-btn svg { width: 15px; height: 15px; }

  /* ── MAIN ── */
  .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .bc-item { color: var(--text2); cursor: pointer; transition: color 0.1s; }
  .bc-item:hover { color: var(--text); }
  .bc-item.active { color: var(--text); font-weight: 500; cursor: default; }
  .bc-sep { color: var(--gray300); }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; border: 1px solid transparent; font-family: 'DM Sans', sans-serif;
  }
  .btn svg { width: 14px; height: 14px; }
  .btn-primary { background: var(--amber); color: var(--navy); border-color: var(--amber); }
  .btn-primary:hover { background: #e08e00; border-color: #e08e00; }
  .btn-secondary { background: var(--surface); color: var(--text2); border-color: var(--border); }
  .btn-secondary:hover { background: var(--gray50); border-color: var(--gray300); color: var(--text); }
  .btn-danger { background: var(--red-light); color: var(--red); border-color: #fecaca; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-ghost { background: none; color: var(--text2); border-color: transparent; }
  .btn-ghost:hover { background: var(--gray100); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .page { padding: 28px; flex: 1; }
  .page-header { margin-bottom: 22px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .page-title { font-size: 22px; font-weight: 600; color: var(--text); }
  .page-sub { font-size: 13.5px; color: var(--text2); margin-top: 3px; }

  /* ── CARDS GRID ── */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    cursor: pointer; transition: all 0.18s;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .project-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--gray300); }
  .card-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 10px 0 0 10px; }
  .card-body { padding-left: 12px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-name { font-size: 14.5px; font-weight: 600; color: var(--text); line-height: 1.35; }
  .card-client { font-size: 12.5px; color: var(--text2); margin-bottom: 10px; }
  .card-stats { display: flex; gap: 14px; }
  .stat-pill { font-size: 11.5px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .stat-pill svg { width: 12px; height: 12px; }

  /* ── BADGES ── */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-active { background: var(--green-light); color: #16a34a; }
  .badge-complete { background: var(--blue-light); color: #1d4ed8; }
  .badge-hold { background: var(--amber-light); color: var(--amber-dark); }
  .badge-tender { background: #faf5ff; color: #7c3aed; }

  /* ── DRAWINGS LIST ── */
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin: 20px 0 8px; }
  .section-title:first-of-type { margin-top: 0; }
  .drawing-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .drawing-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 11px 14px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.12s;
  }
  .drawing-row:hover { border-color: var(--gray300); background: var(--gray50); }
  .pdf-icon-wrap {
    width: 34px; height: 34px; background: #fff5f5; border: 1px solid #fecaca;
    border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .pdf-icon-wrap svg { width: 16px; height: 16px; }
  .row-info { flex: 1; min-width: 0; }
  .row-name { font-size: 13.5px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-meta { font-size: 11.5px; color: var(--text3); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .row-actions { display: flex; align-items: center; gap: 6px; opacity: 0; transition: opacity 0.12s; }
  .drawing-row:hover .row-actions { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.1s;
  }
  .icon-btn:hover { background: var(--gray100); border-color: var(--gray300); color: var(--text); }
  .icon-btn svg { width: 13px; height: 13px; }
  .icon-btn.danger:hover { background: var(--red-light); border-color: #fecaca; color: var(--red); }
  .row-chevron { color: var(--gray300); }
  .row-chevron svg { width: 16px; height: 16px; }

  /* ── PDF VIEWER ── */
  .viewer-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .viewer-bar {
    background: var(--navy2); padding: 10px 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .viewer-filename { color: #e5e7eb; font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'DM Mono', monospace; }
  .viewer-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px; color: #d1d5db; font-size: 12px; padding: 5px 10px;
    cursor: pointer; transition: all 0.1s; white-space: nowrap; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 5px;
  }
  .viewer-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .viewer-btn svg { width: 13px; height: 13px; }
  .viewer-frame { width: 100%; height: 75vh; border: none; background: #525659; display: block; }
  .viewer-placeholder {
    height: 75vh; background: #525659;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .viewer-placeholder-card {
    background: #fff; width: 340px; padding: 32px;
    border-radius: 4px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .viewer-placeholder-card .dwg-no { font-family: 'DM Mono', monospace; font-size: 11px; color: #999; }
  .viewer-placeholder-card .dwg-name { font-size: 15px; font-weight: 600; color: #111; }
  .viewer-placeholder-card .dwg-hint { font-size: 12px; color: #aaa; }
  .pdf-mock-lines { width: 100%; margin-top: 4px; }
  .pdf-mock-line { height: 7px; background: #eee; border-radius: 4px; margin-bottom: 7px; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.18s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    transform: translateY(8px); transition: transform 0.18s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { padding: 22px 24px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-close { width: 30px; height: 30px; border-radius: 6px; border: none; background: var(--gray100); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); }
  .modal-close:hover { background: var(--gray200); }
  .modal-close svg { width: 14px; height: 14px; }
  .modal-body { padding: 22px 24px; display: flex; flex-direction: column; gap: 16px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12.5px; font-weight: 500; color: var(--text2); }
  .form-input, .form-select, .form-textarea {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 9px 12px; font-size: 13.5px; color: var(--text);
    font-family: 'DM Sans', sans-serif; background: var(--surface);
    transition: border-color 0.12s; width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none; border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-hint { font-size: 11.5px; color: var(--text3); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ── PROJECT DETAIL HEADER ── */
  .project-header-card {
    background: var(--navy); border-radius: var(--radius); padding: 20px 24px;
    margin-bottom: 22px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .ph-name { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .ph-client { font-size: 13.5px; color: rgba(255,255,255,0.5); }
  .ph-meta { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
  .ph-stat { display: flex; flex-direction: column; gap: 2px; }
  .ph-stat-val { font-size: 18px; font-weight: 600; color: var(--amber); }
  .ph-stat-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.8px; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-icon { width: 48px; height: 48px; margin: 0 auto 14px; color: var(--gray300); }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--text3); }

  /* ── CONFIRM DIALOG ── */
  .confirm-modal { max-width: 380px; }
  .confirm-icon { width: 44px; height: 44px; background: var(--red-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .confirm-icon svg { width: 22px; height: 22px; color: var(--red); }
  .confirm-text { font-size: 13.5px; color: var(--text2); line-height: 1.55; }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--navy); color: #fff; border-radius: 8px;
    padding: 12px 16px; font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    display: flex; align-items: center; gap: 8px;
    animation: slideIn 0.2s ease; max-width: 300px;
  }
  .toast.success .toast-dot { background: var(--green); }
  .toast.error .toast-dot { background: var(--red); }
  .toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
  .color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; display: inline-block; }

  @media (max-width: 720px) {
    .sidebar { width: 200px; }
    .main { margin-left: 200px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="bolt-badge">
        <svg viewBox="0 0 16 18" xmlns="http://www.w3.org/2000/svg"><path d="M9 1L2 10h6l-1 7 7-9H8l1-7z"/></svg>
      </div>
      <div>
        <div class="logo-name" style="letter-spacing:1.5px;font-size:14px;">RIDGEVIEW</div>
        <div class="logo-tagline">Drawing Register</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <div class="nav-item active" onclick="navigate('projects')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Projects
      </div>
      <div class="nav-item" onclick="navigate('all-drawings')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2a1 1 0 011-1h6l3 3v10a1 1 0 01-1 1H4a1 1 0 01-1-1V2z"/><path d="M9 1v3h3"/><path d="M5 8h6M5 11h4"/></svg>
        All Drawings
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" id="user-avatar">AD</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Admin</div>
          <div class="user-role" id="user-role">Administrator</div>
        </div>
        <button class="logout-btn" title="Sign out" onclick="signOut()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="bc-item active">Projects</span>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="page" id="page"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal-box"></div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<script>
// ─── DATA STORE ─────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ridgeview_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultData();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
}

function defaultData() {
  return {
    projects: [
      {
        id: 'p1', name: 'Riverside Commercial Complex', client: 'Riverside Dev Group',
        status: 'active', color: '#f59e0b', description: '12-storey commercial office tower, full electrical fit-out.',
        created: '2026-01-15', updated: '2026-04-28',
        categories: [
          { id: 'c1', name: 'Single Line Diagrams', drawings: [
            { id: 'd1', name: 'Main Distribution Board — SLD', number: 'SL-001', rev: 'Rev C', date: 'Apr 2026', driveUrl: '' },
            { id: 'd2', name: 'Sub Distribution Board 1A', number: 'SL-002', rev: 'Rev B', date: 'Mar 2026', driveUrl: '' },
          ]},
          { id: 'c2', name: 'Floor Plans', drawings: [
            { id: 'd3', name: 'Level 1 — Power Layout', number: 'FP-101', rev: 'Rev D', date: 'Apr 2026', driveUrl: '' },
            { id: 'd4', name: 'Level 2 — Power Layout', number: 'FP-102', rev: 'Rev C', date: 'Apr 2026', driveUrl: '' },
          ]},
        ]
      },
      {
        id: 'p2', name: 'Northgate Industrial Fitout', client: 'NorTech Manufacturing',
        status: 'active', color: '#3b82f6', description: 'HV/LV industrial electrical installation for manufacturing facility.',
        created: '2026-02-01', updated: '2026-04-25',
        categories: [
          { id: 'c3', name: 'Single Line Diagrams', drawings: [
            { id: 'd5', name: 'HV Switchroom — SLD', number: 'SL-001', rev: 'Rev B', date: 'Apr 2026', driveUrl: '' },
          ]},
          { id: 'c4', name: 'Cable Schedules', drawings: [
            { id: 'd6', name: 'HV Cable Schedule', number: 'CS-001', rev: 'Rev A', date: 'Feb 2026', driveUrl: '' },
          ]},
        ]
      },
      {
        id: 'p3', name: 'Parkview Apartment Tower', client: 'Summit Property Group',
        status: 'complete', color: '#22c55e', description: '18-level residential apartment tower.',
        created: '2025-09-10', updated: '2026-03-10',
        categories: []
      },
    ]
  };
}

let db = loadData();

// ─── ROUTER ─────────────────────────────────────────────────────────────────
let route = { view: 'projects', projectId: null, drawingId: null };

function navigate(view, projectId, drawingId) {
  route = { view, projectId: projectId || null, drawingId: drawingId || null };
  render();
}

function render() {
  if (route.view === 'projects') renderProjects();
  else if (route.view === 'project') renderProject();
  else if (route.view === 'drawing') renderDrawing();
  else if (route.view === 'all-drawings') renderAllDrawings();
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function uid() { return 'x' + Math.random().toString(36).slice(2, 9); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function totalDrawings(p) { return (p.categories || []).reduce((a, c) => a + (c.drawings || []).length, 0); }
function getProject(id) { return db.projects.find(p => p.id === id); }

function statusBadge(s) {
  const map = { active: 'badge-active', complete: 'badge-complete', hold: 'badge-hold', tender: 'badge-tender' };
  const label = { active: 'Active', complete: 'Complete', hold: 'On Hold', tender: 'Tender' };
  return `<span class="badge ${map[s] || 'badge-hold'}">${label[s] || s}</span>`;
}

function pdfSVG() {
  return `<svg viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 2a1 1 0 011-1h7l3 3v12a1 1 0 01-1 1H4a1 1 0 01-1-1V2z" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <path d="M10 1v3h3" stroke="#ef4444" stroke-width="1.2" fill="none"/>
    <rect x="5.5" y="8" width="5" height="1" rx="0.5" fill="#ef4444" opacity="0.5"/>
    <rect x="5.5" y="10.5" width="4" height="1" rx="0.5" fill="#ef4444" opacity="0.5"/>
    <rect x="5.5" y="13" width="3" height="1" rx="0.5" fill="#ef4444" opacity="0.5"/>
  </svg>`;
}

function getDriveEmbedUrl(url) {
  if (!url) return '';
  // Convert share URL to preview embed URL
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return url;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-dot"></span>${esc(msg)}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── RENDER: PROJECTS LIST ──────────────────────────────────────────────────
function renderProjects() {
  setBreadcrumb([{ label: 'Projects' }]);
  setTopbarActions(`<button class="btn btn-primary" onclick="openAddProject()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
    New Project
  </button>`);

  const cards = db.projects.length === 0
    ? `<div class="empty-state"><div class="empty-title">No projects yet</div><div class="empty-sub">Click "New Project" to get started.</div></div>`
    : db.projects.map(p => {
      const count = totalDrawings(p);
      return `<div class="project-card" onclick="navigate('project','${p.id}')">
        <div class="card-stripe" style="background:${esc(p.color || '#f59e0b')}"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-name">${esc(p.name)}</div>
            ${statusBadge(p.status)}
          </div>
          <div class="card-client">${esc(p.client)}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">
            <div class="card-stats">
              <span class="stat-pill">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2a1 1 0 011-1h5l2 2v7a1 1 0 01-1 1H3a1 1 0 01-1-1V2z"/></svg>
                ${count} drawing${count !== 1 ? 's' : ''}
              </span>
              <span class="stat-pill">Updated ${esc(p.updated || '—')}</span>
            </div>
            <div style="display:flex;gap:6px;" onclick="event.stopPropagation()">
              <button class="icon-btn" title="Edit project" onclick="openEditProject('${p.id}')">
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2l3 3-7 7H2v-3L9 2z"/></svg>
              </button>
              <button class="icon-btn danger" title="Delete project" onclick="confirmDeleteProject('${p.id}')">
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M5 4V2h4v2M6 7v4M8 7v4M3 4l1 8h6l1-8"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

  document.getElementById('page').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Projects</div><div class="page-sub">${db.projects.length} project${db.projects.length !== 1 ? 's' : ''}</div></div>
    </div>
    <div class="projects-grid">${cards}</div>
  `;

  // highlight active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item')[0].classList.add('active');
}

// ─── RENDER: PROJECT DETAIL ──────────────────────────────────────────────────
function renderProject() {
  const p = getProject(route.projectId);
  if (!p) { navigate('projects'); return; }

  setBreadcrumb([
    { label: 'Projects', onclick: "navigate('projects')" },
    { label: p.name }
  ]);
  setTopbarActions(`
    <button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">Edit Project</button>
    <button class="btn btn-primary btn-sm" onclick="openAddCategory('${p.id}')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
      Add Category
    </button>
  `);

  const count = totalDrawings(p);

  let sections = '';
  if (!p.categories || p.categories.length === 0) {
    sections = `<div class="empty-state">
      <svg class="empty-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 8a2 2 0 012-2h20l10 10v24a2 2 0 01-2 2H10a2 2 0 01-2-2V8z"/><path d="M28 6v12h12"/><path d="M16 22h16M16 30h12"/></svg>
      <div class="empty-title">No drawings yet</div>
      <div class="empty-sub">Add a category first, then upload drawing links.</div>
    </div>`;
  } else {
    sections = p.categories.map(cat => `
      <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">
        <span>${esc(cat.name)}</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-secondary btn-sm" style="font-size:11px;padding:3px 9px;" onclick="openAddDrawing('${p.id}','${cat.id}')">+ Add Drawing</button>
          <button class="icon-btn danger" title="Delete category" onclick="confirmDeleteCategory('${p.id}','${cat.id}')">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M5 4V2h4v2M6 7v4M8 7v4M3 4l1 8h6l1-8"/></svg>
          </button>
        </div>
      </div>
      <div class="drawing-list">
        ${cat.drawings.length === 0
          ? `<div style="font-size:12.5px;color:var(--text3);padding:10px 14px;">No drawings in this category yet.</div>`
          : cat.drawings.map(d => `
            <div class="drawing-row">
              <div class="pdf-icon-wrap">${pdfSVG()}</div>
              <div class="row-info" onclick="navigate('drawing','${p.id}','${d.id}')">
                <div class="row-name">${esc(d.name)}</div>
                <div class="row-meta">${esc(d.number)} · ${esc(d.rev)} · ${esc(d.date)}</div>
              </div>
              <div class="row-actions">
                <button class="icon-btn" title="Edit drawing" onclick="openEditDrawing('${p.id}','${cat.id}','${d.id}')">
                  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2l3 3-7 7H2v-3L9 2z"/></svg>
                </button>
                <button class="icon-btn danger" title="Delete drawing" onclick="confirmDeleteDrawing('${p.id}','${cat.id}','${d.id}')">
                  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M5 4V2h4v2M6 7v4M8 7v4M3 4l1 8h6l1-8"/></svg>
                </button>
              </div>
              <div class="row-chevron" onclick="navigate('drawing','${p.id}','${d.id}')">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg>
              </div>
            </div>`).join('')}
      </div>
    `).join('');
  }

  document.getElementById('page').innerHTML = `
    <div class="project-header-card">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
          <div class="ph-name">${esc(p.name)}</div>
          ${statusBadge(p.status)}
        </div>
        <div class="ph-client">${esc(p.client)}</div>
        <div class="ph-meta">
          <div class="ph-stat"><div class="ph-stat-val">${count}</div><div class="ph-stat-label">Drawings</div></div>
          <div class="ph-stat"><div class="ph-stat-val">${(p.categories || []).length}</div><div class="ph-stat-label">Categories</div></div>
          <div class="ph-stat"><div class="ph-stat-val" style="font-size:13px;padding-top:3px;">${esc(p.updated || '—')}</div><div class="ph-stat-label">Last Updated</div></div>
        </div>
      </div>
      ${p.description ? `<div style="font-size:13px;color:rgba(255,255,255,0.45);max-width:280px;line-height:1.55;">${esc(p.description)}</div>` : ''}
    </div>
    ${sections}
  `;
}

// ─── RENDER: DRAWING VIEWER ─────────────────────────────────────────────────
function renderDrawing() {
  const p = getProject(route.projectId);
  if (!p) { navigate('projects'); return; }
  let drawing = null, catName = '';
  for (const cat of (p.categories || [])) {
    const d = cat.drawings.find(x => x.id === route.drawingId);
    if (d) { drawing = d; catName = cat.name; break; }
  }
  if (!drawing) { navigate('project', route.projectId); return; }

  setBreadcrumb([
    { label: 'Projects', onclick: "navigate('projects')" },
    { label: p.name, onclick: `navigate('project','${p.id}')` },
    { label: drawing.number + ' — ' + drawing.name }
  ]);
  setTopbarActions('');

  const embedUrl = getDriveEmbedUrl(drawing.driveUrl);

  const viewerContent = embedUrl
    ? `<iframe src="${esc(embedUrl)}" class="viewer-frame" allowfullscreen></iframe>`
    : `<div class="viewer-placeholder">
        <div class="viewer-placeholder-card">
          <div style="font-size:40px;">📄</div>
          <div class="dwg-no">${esc(drawing.number)} · ${esc(drawing.rev)}</div>
          <div class="dwg-name">${esc(drawing.name)}</div>
          <div class="pdf-mock-lines">
            <div class="pdf-mock-line"></div>
            <div class="pdf-mock-line" style="width:75%"></div>
            <div class="pdf-mock-line"></div>
            <div class="pdf-mock-line" style="width:55%"></div>
            <div class="pdf-mock-line" style="width:85%"></div>
          </div>
          <div class="dwg-hint">No Google Drive link added yet.<br>Edit this drawing to add one.</div>
        </div>
      </div>`;

  document.getElementById('page').innerHTML = `
    <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div>
        <div style="font-size:19px;font-weight:600;">${esc(drawing.name)}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:3px;font-family:'DM Mono',monospace;">${esc(drawing.number)} · ${esc(drawing.rev)} · ${esc(catName)} · ${esc(p.name)}</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="navigate('project','${p.id}')">← Back to drawings</button>
        ${drawing.driveUrl ? `<a href="${esc(drawing.driveUrl)}" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none;">Open in Drive ↗</a>` : ''}
      </div>
    </div>
    <div class="viewer-wrap">
      <div class="viewer-bar">
        <span class="viewer-filename">${esc(drawing.number)} — ${esc(drawing.name)}.pdf</span>
        ${drawing.driveUrl ? `<a href="${esc(drawing.driveUrl)}" target="_blank" class="viewer-btn" style="text-decoration:none;">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v8M4 6l3 3 3-3M1 10v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>
          Open / Download
        </a>` : ''}
      </div>
      ${viewerContent}
    </div>
  `;
}

// ─── RENDER: ALL DRAWINGS ───────────────────────────────────────────────────
function renderAllDrawings() {
  setBreadcrumb([{ label: 'All Drawings' }]);
  setTopbarActions('');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item')[1].classList.add('active');

  let rows = '';
  let total = 0;
  for (const p of db.projects) {
    for (const cat of (p.categories || [])) {
      for (const d of cat.drawings) {
        total++;
        rows += `<div class="drawing-row">
          <div class="pdf-icon-wrap">${pdfSVG()}</div>
          <div class="row-info" onclick="navigate('drawing','${p.id}','${d.id}')">
            <div class="row-name">${esc(d.name)}</div>
            <div class="row-meta">${esc(d.number)} · ${esc(p.name)} · ${esc(cat.name)}</div>
          </div>
          <div class="row-chevron" onclick="navigate('drawing','${p.id}','${d.id}')">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg>
          </div>
        </div>`;
      }
    }
  }

  document.getElementById('page').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">All Drawings</div><div class="page-sub">${total} drawing${total !== 1 ? 's' : ''} across all projects</div></div>
    </div>
    ${total === 0 ? '<div class="empty-state"><div class="empty-title">No drawings yet</div><div class="empty-sub">Add drawings from within each project.</div></div>'
      : `<div class="drawing-list">${rows}</div>`}
  `;
}

// ─── UI HELPERS ─────────────────────────────────────────────────────────────
function setBreadcrumb(items) {
  document.getElementById('breadcrumb').innerHTML = items.map((item, i) => {
    const isLast = i === items.length - 1;
    return (i > 0 ? '<span class="bc-sep">›</span>' : '')
      + `<span class="bc-item${isLast ? ' active' : ''}" ${item.onclick ? `onclick="${item.onclick}"` : ''}>${esc(item.label)}</span>`;
  }).join('');
}

function setTopbarActions(html) {
  document.getElementById('topbar-actions').innerHTML = html;
}

// ─── MODAL HELPERS ──────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ─── PROJECT MODALS ──────────────────────────────────────────────────────────
const STATUS_OPTIONS = ['active', 'complete', 'hold', 'tender'];
const COLOR_OPTIONS = ['#f59e0b','#3b82f6','#22c55e','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

function colorPicker(selected) {
  return COLOR_OPTIONS.map(c =>
    `<div onclick="selectColor('${c}')" id="cp-${c.slice(1)}" style="
      width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;
      border:3px solid ${c === selected ? '#111' : 'transparent'};
      transition:border 0.1s;box-sizing:border-box;
    "></div>`
  ).join('');
}

function selectColor(c) {
  COLOR_OPTIONS.forEach(col => {
    const el = document.getElementById('cp-' + col.slice(1));
    if (el) el.style.border = `3px solid ${col === c ? '#111' : 'transparent'}`;
  });
  document.getElementById('project-color-input').value = c;
}

function openAddProject() {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">New Project</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l12 12M13 1L1 13"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Project Name *</label>
        <input class="form-input" id="p-name" placeholder="e.g. Riverside Commercial Complex" />
      </div>
      <div class="form-group">
        <label class="form-label">Client Name *</label>
        <input class="form-input" id="p-client" placeholder="e.g. Riverside Dev Group" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="p-status">
            ${STATUS_OPTIONS.map(s => `<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Updated Date</label>
          <input class="form-input" id="p-updated" placeholder="e.g. Apr 2026" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="p-desc" placeholder="Brief project description…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Card Colour</label>
        <input type="hidden" id="project-color-input" value="#f59e0b" />
        <div style="display:flex;gap:8px;flex-wrap:wrap;">${colorPicker('#f59e0b')}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddProject()">Create Project</button>
    </div>
  `);
}

function submitAddProject() {
  const name = document.getElementById('p-name').value.trim();
  const client = document.getElementById('p-client').value.trim();
  if (!name || !client) { toast('Please fill in project name and client.', 'error'); return; }
  const p = {
    id: uid(), name, client,
    status: document.getElementById('p-status').value,
    color: document.getElementById('project-color-input').value,
    description: document.getElementById('p-desc').value.trim(),
    updated: document.getElementById('p-updated').value.trim() || new Date().toLocaleDateString('en-AU', {month:'short',year:'numeric'}),
    created: new Date().toISOString().split('T')[0],
    categories: []
  };
  db.projects.push(p);
  saveData();
  closeModal();
  toast('Project created.');
  render();
}

function openEditProject(id) {
  const p = getProject(id);
  if (!p) return;
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Edit Project</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l12 12M13 1L1 13"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Project Name *</label>
        <input class="form-input" id="p-name" value="${esc(p.name)}" />
      </div>
      <div class="form-group">
        <label class="form-label">Client Name *</label>
        <input class="form-input" id="p-client" value="${esc(p.client)}" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="p-status">
            ${STATUS_OPTIONS.map(s => `<option value="${s}" ${p.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Updated Date</label>
          <input class="form-input" id="p-updated" value="${esc(p.updated||'')}" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="p-desc">${esc(p.description||'')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Card Colour</label>
        <input type="hidden" id="project-color-input" value="${esc(p.color||'#f59e0b')}" />
        <div style="display:flex;gap:8px;flex-wrap:wrap;">${colorPicker(p.color||'#f59e0b')}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEditProject('${id}')">Save Changes</button>
    </div>
  `);
}

function submitEditProject(id) {
  const p = getProject(id);
  if (!p) return;
  const name = document.getElementById('p-name').value.trim();
  const client = document.getElementById('p-client').value.trim();
  if (!name || !client) { toast('Please fill in project name and client.', 'error'); return; }
  Object.assign(p, {
    name, client,
    status: document.getElementById('p-status').value,
    color: document.getElementById('project-color-input').value,
    description: document.getElementById('p-desc').value.trim(),
    updated: document.getElementById('p-updated').value.trim()
  });
  saveData();
  closeModal();
  toast('Project updated.');
  render();
}

function confirmDeleteProject(id) {
  const p = getProject(id);
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Delete Project</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l12 12M13 1L1 13"/></svg></button>
    </div>
    <div class="modal-body" style="text-align:center;">
      <div class="confirm-icon" style="margin:0 auto 12px;">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 8v5M11 15.5v.5"/><circle cx="11" cy="11" r="9"/></svg>
      </div>
      <div style="font-size:15px;font-weight:600;margin-bottom:8px;">Delete "${esc(p.name)}"?</div>
      <div class="confirm-text">This will permanently delete the project and all its drawings. This cannot be undone.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteProject('${id}')">Delete Project</button>
    </div>
  `);
}

function deleteProject(id) {
  db.projects = db.projects.filter(p => p.id !== id);
  saveData();
  closeModal();
  toast('Project deleted.');
  navigate('projects');
}

// ─── CATEGORY MODALS ─────────────────────────────────────────────────────────
function openAddCategory(projectId) {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">New Category</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l12 12M13 1L1 13"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Category Name *</label>
        <input class="form-input" id="cat-name" placeholder="e.g. Single Line Diagrams, Floor Plans, Cable Schedules…" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddCategory('${projectId}')">Add Category</button>
    </div>
  `);
}

function submitAddCategory(projectId) {
  const name = document.getElementById('cat-name').value.trim();
  if (!name) { toast('Please enter a category name.', 'error'); return; }
  const p = getProject(projectId);
  if (!p.categories) p.categories = [];
  p.categories.push({ id: uid(), name, drawings: [] });
  saveData();
  closeModal();
  toast('Category added.');
  render();
}

function confirmDeleteCategory(projectId, catId) {
  const p = getProject(projectId);
  const cat = p.categories.find(c => c.id === catId);
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Delete Category</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l12 12M13 1L1 13"/></svg></button>
    </div>
    <div class="modal-body" style="text-align:center;">
      <div class="confirm-text">Delete category "<strong>${esc(cat.name)}</strong>" and all ${cat.drawings.length} drawing(s) within it?</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteCategory('${projectId}','${catId}')">Delete</button>
    </div>
  `);
}

function deleteCategory(projectId, catId) {
  const p = getProject(projectId);
  p.categories = p.categories.filter(c => c.id !== catId);
  saveData();
  closeModal();
  toast('Category deleted.');
  render();
}

// ─── DRAWING MODALS ──────────────────────────────────────────────────────────
function drawingForm(d) {
  d = d || {};
  return `
    <div class="form-group">
      <label class="form-label">Drawing Name *</label>
      <input class="form-input" id="d-name" value="${esc(d.name||'')}" placeholder="e.g. Main Distribution Board — SLD" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Drawing Number *</label>
        <input class="form-input" id="d-number" value="${esc(d.number||'')}" placeholder="e.g. SL-001" />
      </div>
      <div class="form-group">
        <label class="form-label">Revision</label>
        <input class="form-input" id="d-rev" value="${esc(d.rev||'')}" placeholder="e.g. Rev A" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" id="d-date" value="${esc(d.date||'')}" placeholder="e.g. Apr 2026" />
    </div>
    <div class="form-group">
      <label class="form-label">Google Drive Link</label>
      <input class="form-input" id="d-url" value="${esc(d.driveUrl||'')}" placeholder="https://drive.google.com/file/d/…/view" />
      <div class="form-hint">Paste the "Share" link from Google Drive. Make sure sharing is set to "Anyone with the link can view".</div>
    </div>
  `;
}

function openAddDrawing(projectId, catId) {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Add Drawing</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l12 12M13 1L1 13"/></svg></button>
    </div>
    <div class="modal-body">${drawingForm()}</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddDrawing('${projectId}','${catId}')">Add Drawing</button>
    </div>
  `);
}

function submitAddDrawing(projectId, catId) {
  const name = document.getElementById('d-name').value.trim();
  const number = document.getElementById('d-number').value.trim();
  if (!name || !number) { toast('Drawing name and number are required.', 'error'); return; }
  const p = getProject(projectId);
  const cat = p.categories.find(c => c.id === catId);
  cat.drawings.push({
    id: uid(), name, number,
    rev: document.getElementById('d-rev').value.trim(),
    date: document.getElementById('d-date').value.trim(),
    driveUrl: document.getElementById('d-url').value.trim()
  });
  // update project date
  p.updated = new Date().toLocaleDateString('en-AU', {month:'short',year:'numeric'});
  saveData();
  closeModal();
  toast('Drawing added.');
  render();
}

function openEditDrawing(projectId, catId, drawingId) {
  const p = getProject(projectId);
  const cat = p.categories.find(c => c.id === catId);
  const d = cat.drawings.find(x => x.id === drawingId);
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Edit Drawing</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l12 12M13 1L1 13"/></svg></button>
    </div>
    <div class="modal-body">${drawingForm(d)}</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEditDrawing('${projectId}','${catId}','${drawingId}')">Save Changes</button>
    </div>
  `);
}

function submitEditDrawing(projectId, catId, drawingId) {
  const name = document.getElementById('d-name').value.trim();
  const number = document.getElementById('d-number').value.trim();
  if (!name || !number) { toast('Drawing name and number are required.', 'error'); return; }
  const p = getProject(projectId);
  const cat = p.categories.find(c => c.id === catId);
  const d = cat.drawings.find(x => x.id === drawingId);
  Object.assign(d, {
    name, number,
    rev: document.getElementById('d-rev').value.trim(),
    date: document.getElementById('d-date').value.trim(),
    driveUrl: document.getElementById('d-url').value.trim()
  });
  p.updated = new Date().toLocaleDateString('en-AU', {month:'short',year:'numeric'});
  saveData();
  closeModal();
  toast('Drawing updated.');
  render();
}

function confirmDeleteDrawing(projectId, catId, drawingId) {
  const p = getProject(projectId);
  const cat = p.categories.find(c => c.id === catId);
  const d = cat.drawings.find(x => x.id === drawingId);
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Delete Drawing</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l12 12M13 1L1 13"/></svg></button>
    </div>
    <div class="modal-body" style="text-align:center;">
      <div class="confirm-text">Delete "<strong>${esc(d.name)}</strong>" (${esc(d.number)})? This cannot be undone.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteDrawing('${projectId}','${catId}','${drawingId}')">Delete</button>
    </div>
  `);
}

function deleteDrawing(projectId, catId, drawingId) {
  const p = getProject(projectId);
  const cat = p.categories.find(c => c.id === catId);
  cat.drawings = cat.drawings.filter(d => d.id !== drawingId);
  saveData();
  closeModal();
  toast('Drawing deleted.');
  render();
}

// ─── AUTH (placeholder — swap with Supabase) ──────────────────────────────
function signOut() {
  if (confirm('Sign out?')) toast('Sign out coming soon — connect Supabase auth to enable.');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
